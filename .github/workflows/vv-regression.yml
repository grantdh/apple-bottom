name: Build Check

# CI verifies compile-time correctness only. GPU tests require Metal device
# access (MTLCreateSystemDefaultDevice), which GitHub Actions runners don't
# expose. Full GPU validation (48 tests + convergence study) must be run
# locally via `make ci-local` before release (see docs/RELEASING.md).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-check:
    name: Compile Source Files
    runs-on: macos-14
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - name: Compile source files
      run: make build-check
