name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on macOS
    runs-on: macos-14  # macOS Sonoma with Apple Silicon

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check environment
      run: |
        sw_vers
        uname -m
        clang --version

    - name: Validate environment
      run: |
        chmod +x scripts/validate_environment.sh
        ./scripts/validate_environment.sh || true  # Don't fail on GPU check in CI

    - name: Build library
      run: make

    - name: Build tests
      run: |
        make build/test_correctness
        make build/test_precision
        make build/bench_dgemm

    - name: Note about GPU tests
      run: |
        echo "═══════════════════════════════════════════════════════════════════"
        echo "✓ Build successful!"
        echo ""
        echo "Note: GPU tests require Apple Silicon hardware with Metal support."
        echo "GitHub Actions runners don't have GPU access for Metal compute."
        echo ""
        echo "To run tests locally:"
        echo "  ./build/test_correctness"
        echo "  ./build/test_precision"
        echo "  ./build/bench_dgemm"
        echo "═══════════════════════════════════════════════════════════════════"
