    name: Build Requirements
    runs-on: ubuntu-latest
    steps:
    - name: Build Information
      run: |
        echo "═══════════════════════════════════════════════════════════════════"
        echo "apple-bottom: FP64 BLAS for Apple Silicon GPU"
        echo "═══════════════════════════════════════════════════════════════════"
        echo ""
        echo "⚠️  This library requires local build on Apple Silicon Mac"
        echo ""
        echo "Requirements:"
        echo "  • macOS 14+ (Sonoma)"
        echo "  • Apple Silicon (M1/M2/M3/M4)"
        echo "  • Xcode Command Line Tools"
        echo ""
        echo "Build locally:"
        echo "  git clone https://github.com/grantdh/apple-bottom.git"
        echo "  cd apple-bottom"
        echo "  make"
        echo "  make test"
        echo ""
