name: Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on macOS
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check environment
      run: |
        sw_vers
        uname -m
        clang --version

    - name: Build library
      run: make

    - name: Note about testing
      run: |
        echo "✓ Build successful"
        echo ""
        echo "Note: Tests require Apple Silicon with Metal GPU."
        echo "GitHub Actions runners don't have GPU access."
        echo "Run tests locally: ./build/test_correctness && ./build/test_precision"
