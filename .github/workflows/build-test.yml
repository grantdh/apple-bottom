name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on macOS
    runs-on: macos-14  # macOS Sonoma with Apple Silicon

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check environment
      run: |
        sw_vers
        uname -m
        swift --version

    - name: Validate Metal support
      run: |
        chmod +x scripts/validate_environment.sh
        ./scripts/validate_environment.sh

    - name: Build production kernel
      run: make production

    - name: Run tests
      run: ./build/dd_gemm | tee test_output.txt

    - name: Verify test results
      run: |
        if grep -q "FAIL" test_output.txt; then
          echo "❌ Tests failed"
          exit 1
        fi
        if grep -q "PASS" test_output.txt; then
          echo "✓ Tests passed"
        else
          echo "⚠️ Warning: No test results found"
        fi

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test_output.txt
